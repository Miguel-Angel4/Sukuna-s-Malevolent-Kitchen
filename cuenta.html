<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Sukuna's Malevolent Kitchen - Gestión de tu perfil de Hechicero.">
  <title>Mi Cuenta - Sukuna's Malevolent Kitchen</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="icon" type="image/png" sizes="32x32" href="img/icono.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .profile-img-container {
        width: 150px;
        height: 150px;
        margin: 0 auto 20px;
        border-radius: 50%;
        overflow: hidden;
        border: 3px solid #B31B1B;
        background: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }
    .profile-img-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .profile-img-container .upload-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0,0,0,0.6);
        color: white;
        font-size: 12px;
        padding: 4px 0;
        opacity: 0;
        transition: opacity 0.3s;
        cursor: pointer;
    }
    .profile-img-container:hover .upload-overlay {
        opacity: 1;
    }
  </style>
</head>

<body class="home">

  <!-- ZONA DEL HEADER -->
  <header class="header" id="header">
    <a href="home.html" class="logo" aria-label="Volver al inicio">
      <img src="img/logo.png" alt="Logo Sukuna's Malevolent Kitchen" />
    </a>
    <div class="header-content">
      <nav class="menu">
        <a href="carta.html" class="nav-link"><strong>Nuestra carta</strong></a>
        <a href="home.html#descuentos" class="nav-link"><strong>Descuentos</strong></a>
        <a href="cv.html" class="nav-link"><strong>¿Quieres trabajar para nosotros?</strong></a>
        <a href="reserva.html" class="nav-link"><strong>Reserva</strong></a>
        <a href="login.html" class="nav-link" id="nav-login"><strong>Iniciar sesión</strong></a>
      </nav>
    </div>
  </header>

  <!-- MEJORA DEL FONDO -->
  <div class="circle-overlay"></div>
  <div class="blood-particles" id="bloodParticles"></div>

  <main>
    <section class="seccion-empleos fade-in" style="padding: 120px 0 80px 0;">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-6 text-center mb-5">
            <h2 class="titulo-trabajadores">PERFIL DE HECHICERO</h2>
            <p class="frase-ingredientes">Gestiona tu identidad dentro del Dominio.</p>
          </div>
        </div>

        <div class="row justify-content-center">
          <div class="col-lg-6">
            <div id="cuenta-container" class="form-sukuna glass-effect text-center p-5">
              
              <!-- Imagen de Perfil -->
              <div class="profile-img-container" id="profile-img-wrapper">
                <img src="img/icono.png" alt="Perfil" id="display-profile-img">
                <label for="profile-upload" class="upload-overlay">Cambiar Foto</label>
                <input type="file" id="profile-upload" style="display:none;" accept="image/*">
              </div>

              <form id="profile-form">
                <div class="mb-4 text-start">
                  <label class="form-label" style="color:#B31B1B;">Correo Electrónico</label>
                  <input type="text" id="profile-email" class="form-control input-sukuna" disabled style="opacity:0.7;">
                </div>

                <div class="mb-4 text-start">
                  <label for="profile-name" class="form-label">Nombre del Hechicero / Apodo</label>
                  <input type="text" id="profile-name" class="form-control input-sukuna" placeholder="Pon tu nombre aquí">
                </div>

                <div class="mb-4 text-start">
                  <label for="profile-bio" class="form-label">Técnica Maldita / Bio</label>
                  <textarea id="profile-bio" class="form-control input-sukuna" rows="3" placeholder="Describe tu técnica..."></textarea>
                </div>

                <div class="text-center mt-5">
                  <button type="submit" class="botoncarta hover-lift">Guardar Cambios</button>
                </div>

                <div class="mt-4 pt-3 border-top border-secondary">
                   <a href="#" id="logout-link" style="color:#ffffff; font-size:14px; opacity:0.8; text-decoration:none;">Abandonar el Dominio (Cerrar sesión)</a>
                </div>
              </form>

              <div id="profile-msg" class="alert d-none mt-3"></div>

            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-content">
        <nav class="menu" style="text-align: center;">
          <a href="#faq" class="footer-link"><strong>Preguntas Frecuentes</strong></a>
          <a href="#contacto" class="footer-link"><strong>Contáctanos</strong></a>
          <a href="#cookies" class="footer-link"><strong>Configuración de cookies</strong></a>
          <a href="#legal" class="footer-link"><strong>Aviso legal</strong></a>
          <a href="#derechos" class="footer-link"><strong>Derechos Reservados</strong></a>
          <a href="#privacidad" class="footer-link"><strong>Política de Privacidad</strong></a>
        </nav>
      </div>
    </footer>
  </main>

  <script src="js/main.js"></script>
</body>

</html>
